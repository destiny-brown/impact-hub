name: Performance Benchmark

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Target API base URL"
        required: false
        type: string
      concurrency:
        description: "Concurrent requests"
        required: false
        default: "10"
        type: string
      requests:
        description: "Total requests"
        required: false
        default: "100"
        type: string
      warmup_requests:
        description: "Warmup requests"
        required: false
        default: "10"
        type: string
      seed_count:
        description: "Seeded volunteers"
        required: false
        default: "100"
        type: string
      run_seed:
        description: "Run seed step"
        required: false
        default: false
        type: boolean

  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PERF_DATABASE_URL: ${{ secrets.PERF_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Resolve config
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_CONCURRENCY: ${{ github.event.inputs.concurrency }}
          INPUT_REQUESTS: ${{ github.event.inputs.requests }}
          INPUT_WARMUP: ${{ github.event.inputs.warmup_requests }}
          INPUT_SEED: ${{ github.event.inputs.seed_count }}
          INPUT_RUN_SEED: ${{ github.event.inputs.run_seed }}
        run: |
          set -e

          target_url="${INPUT_URL:-${{ vars.PERF_TARGET_API_URL }}}"

          OUTPUT_DIR="perf-results/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$OUTPUT_DIR"

          echo "TARGET_API_URL=$target_url" >> $GITHUB_ENV
          echo "CONCURRENCY=${INPUT_CONCURRENCY:-10}" >> $GITHUB_ENV
          echo "TOTAL_REQUESTS=${INPUT_REQUESTS:-100}" >> $GITHUB_ENV
          echo "WARMUP_REQUESTS=${INPUT_WARMUP:-10}" >> $GITHUB_ENV
          echo "SEED_COUNT=${INPUT_SEED:-100}" >> $GITHUB_ENV
          echo "RUN_SEED=${INPUT_RUN_SEED:-false}" >> $GITHUB_ENV
          echo "PERF_OUTPUT_DIR=$OUTPUT_DIR" >> $GITHUB_ENV

      - name: Run benchmark
        run: |
          npm run perf:run || echo "Benchmark failed, continuing..."

      - name: Ensure summary exists (fallback)
        if: always()
        run: |
          if [ ! -f "${PERF_OUTPUT_DIR}/benchmark-summary.md" ]; then
            echo "## Benchmark Summary" > "${PERF_OUTPUT_DIR}/benchmark-summary.md"
            echo "No summary generated by script. Check logs." >> "${PERF_OUTPUT_DIR}/benchmark-summary.md"
          fi

      - name: Show summary
        if: always()
        run: |
          cat "${PERF_OUTPUT_DIR}/benchmark-summary.md" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: ${{ env.PERF_OUTPUT_DIR }}
          if-no-files-found: warn
