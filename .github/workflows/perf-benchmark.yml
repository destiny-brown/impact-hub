name: Performance Benchmark

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    name: benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Set environment variables
        run: |
          OUTPUT_DIR="perf-results/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$OUTPUT_DIR"

          TARGET_API_URL="${{ vars.PERF_TARGET_API_URL }}"
          if [ -z "$TARGET_API_URL" ]; then
            TARGET_API_URL="https://impact-hub-hazel.vercel.app"
          fi

          echo "TARGET_API_URL=$TARGET_API_URL" >> $GITHUB_ENV
          echo "CONCURRENCY=10" >> $GITHUB_ENV
          echo "TOTAL_REQUESTS=200" >> $GITHUB_ENV
          echo "WARMUP_REQUESTS=50" >> $GITHUB_ENV
          echo "PERF_OUTPUT_DIR=$OUTPUT_DIR" >> $GITHUB_ENV

      - name: Run benchmark (required)
        run: npm run perf:run

      - name: Publish summary
        if: always()
        run: |
          if [ -f "${PERF_OUTPUT_DIR}/benchmark-summary.md" ]; then
            cat "${PERF_OUTPUT_DIR}/benchmark-summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "No benchmark summary found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.PERF_OUTPUT_DIR }}
          if-no-files-found: warn